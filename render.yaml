services:
  - type: web
    name: cv-builder-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: PORT
        value: 10000

  - type: cron
    name: cv-bot-keep-alive
    env: python
    schedule: "*/14 * * * *"
    buildCommand: pip install requests
    startCommand: python ping_service.py
    envVars:
      - key: SERVICE_URL
        sync: false
